<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baglanti Yok</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #f8fafc, #e2e8f0);
      color: #0f172a;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }
    p {
      margin-bottom: 0;
      line-height: 1.5;
      color: #334155;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Su anda baglanti yok</h1>
    <p>Internet baglantisi geldiginde sayfa otomatik olarak guncellenecektir.</p>
  </main>
</body>
</html>
